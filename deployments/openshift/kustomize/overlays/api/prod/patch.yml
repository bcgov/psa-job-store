apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: nestjs-app
spec:
  template:
    spec:
      containers:
        - name: nestjs-app
          volumeMounts:
            - name: seed-volume
              mountPath: /usr/src/apps/api/prisma/seed.ts
              subPath: seed.ts
          envFrom:
            - secretRef:
                name: secrets
      volumes:
      - name: seed-volume
        secret:
          secretName: seed-secret
  triggers:
      - type: ConfigChange
      - imageChangeParams:
          automatic: true
          containerNames:
            - nestjs-app
          from:
            kind: ImageStreamTag
            name: api:latest
            namespace: f3c07a-tools
        type: ImageChange
---         
apiVersion: route.openshift.io/v1
kind: Route
metadata:
    name: nestjs-app
spec:
  host: jobstore-api.apps.silver.devops.gov.bc.ca